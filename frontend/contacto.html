<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Tienda de PCs Custom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Lato:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <header>
        <h1 class="title">Mi proyecto Fullstack</h1>
        <nav>
            <a href="index.html"><button>Home</button></a>
            <a href="contacto.html"><button>Contacto</button></a>
            <button>Mi Carrito</button>
        </nav>
    </header>

    <main>
        <h2>Contacto</h2>
        <div class="formulario">
            <form>
                <label>Nombre:</label>
                <input type="text" placeholder="Tu nombre">

                <label>Email:</label>
                <input type="email" placeholder="Tu email">

                <label>Mensaje:</label>
                <textarea placeholder="Tu mensaje" rows="5"></textarea>

                <button type="submit" class="btn-comprar">Enviar</button>
            </form>
        </div>
    </main>

    <footer>
        <p>Todos los reservados - 2026</p>
    </footer>
